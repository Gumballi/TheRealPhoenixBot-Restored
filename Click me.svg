<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <!-- Smooth Linear Gradient -->
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    
    <!-- Drop Shadow Filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15" />
    </filter>

    <!-- Interactive Hover/Active Styles -->
    <style>
      .button-rect {
        cursor: pointer;
        transition: transform 0.2s ease, fill 0.2s ease;
        transform-origin: center;
      }
      .button-group:hover .button-rect {
        transform: scale(1.03);
        filter: brightness(1.1) url(#dropShadow);
      }
      .button-group:active .button-rect {
        transform: scale(0.98);
        filter: brightness(0.95);
      }
      .button-text {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 16px;
        font-weight: 600;
        fill: #FFFFFF;
        letter-spacing: 0.5px;
        pointer-events: none; /* Ensures text doesn't interfere with clicks */
      }
    </style>
  </defs>

  <!-- Button Group -->
  <g class="button-group">
    <!-- Background Rectangle -->
    <rect class="button-rect" x="10" y="6" width="180" height="48" rx="24" fill="url(#btnGradient)" filter="url(#dropShadow)" />
    
    <!-- Button Text -->
    <text class="button-text" x="100" y="35" text-anchor="middle">CLICK ME</text>
  </g>
</svg>
